<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="50" y1="40" x2="150" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5722"/> <stop offset="1" stop-color="#FF9800"/> </linearGradient>

    <filter id="aiGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feFlood flood-color="#FF9800" flood-opacity="0.4" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="40" fill="#FFFBF5"/>

  <rect x="75" y="40" width="50" height="30" rx="8" stroke="url(#mainGradient)" stroke-width="5" fill="none"/>

  <rect x="50" y="60" width="100" height="110" rx="16" stroke="url(#mainGradient)" stroke-width="5" fill="none"/>

  <circle cx="100" cy="95" r="10" fill="#FF9800"/>

  <line x1="75" y1="120" x2="125" y2="120" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="75" y1="135" x2="125" y2="135" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="75" y1="150" x2="110" y2="150" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>

  <path d="M115 150 L125 160 L145 135" 
        stroke="#FF9800" 
        stroke-width="6.5" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#aiGlow)"/>
</svg>
